<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Elite+ — The Pinnacle of AI Artistry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    * { font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: #020202; color: #f8f8f8; scroll-behavior: smooth; overflow-x: hidden; }

    :root {
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --obsidian: #020202;
      --glass-border: rgba(255, 215, 0, 0.15);
      --glass-bg: rgba(255, 255, 255, 0.01);
    }

    section { min-height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; }

    /* Jewelry Box Card Styling */
    .feature-card { 
      background: linear-gradient(145deg, rgba(20,20,20,0.8), rgba(5,5,5,0.9));
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 4rem 3rem;
      position: relative;
      overflow: hidden;
      transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    .feature-card::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.5s;
    }
    .feature-card:hover { 
      transform: translateY(-10px) scale(1.02);
      border-color: var(--gold);
      box-shadow: 0 50px 100px -20px rgba(255,215,0,0.15);
    }
    .feature-card:hover::before { opacity: 1; }

    /* Shimmer Animation */
    .shimmer {
      position: relative; overflow: hidden;
    }
    .shimmer::after {
      content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,215,0,0.1), transparent);
      transform: skewX(-25deg); animation: shimmer 4s infinite;
    }
    @keyframes shimmer { 100% { left: 150%; } }

    /* Luxury Icons (SVG) */
    .lux-icon { width: 64px; height: 64px; color: var(--gold); filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); margin-bottom: 2rem; transition: transform 0.5s; }
    .feature-card:hover .lux-icon { transform: scale(1.1) rotate(5deg); }

    /* Floating Glass Upload Portal */
    .aura-port {
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 80%);
      border: 1px solid var(--glass-border);
      position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all 1s ease;
      box-shadow: inset 0 0 50px rgba(255,215,0,0.05);
    }
    .aura-port:hover { border-color: var(--gold); background: rgba(255,215,0,0.02); box-shadow: 0 0 80px rgba(255,215,0,0.1), inset 0 0 50px rgba(255,215,0,0.1); }
    
    .port-ring {
      position: absolute; inset: -15px; border-radius: 50%; border: 0.5px dashed rgba(255,215,0,0.2); animation: spin 20s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Scanning Animation */
    .scan-line {
      position: absolute; width: 100%; height: 2px; background: var(--gold); top: 0; left: 0;
      opacity: 0; box-shadow: 0 0 20px var(--gold); z-index: 10;
    }
    #loading-state.active .scan-line { opacity: 1; animation: scan 2s linear infinite; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* Editor Viewport */
    .glass-editor { background: rgba(0,0,0,0.4); backdrop-filter: blur(50px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); }

    /* Typography */
    .lux-text { letter-spacing: 0.25em; text-transform: uppercase; font-weight: 300; }
    .gold-glow { text-shadow: 0 0 20px rgba(255,215,0,0.3); }

    /* Buttons */
    .btn-aura {
      background: linear-gradient(135deg, #FFD700, #B8860B);
      color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em;
      padding: 1.5rem 4rem; border-radius: 100px; transition: all 0.5s;
    }
    .btn-aura:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255,215,0,0.4); filter: brightness(1.1); }

    /* Cursor */
    #cursor-ring { position: fixed; width: 50px; height: 50px; border: 0.5px solid var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1); }

    .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.2); transition: all 0.5s; cursor: pointer; }
    .nav-dot.active { background: var(--gold); width: 12px; height: 28px; border-radius: 10px; box-shadow: 0 0 15px var(--gold); }
  </style>
</head>
<body class="overflow-x-hidden no-scroll-auth">

  <style>
    body.no-scroll-auth { overflow: hidden !important; }
  </style>

  <!-- ─── Authentication Overlay ─── -->
  <div id="auth-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-black backdrop-blur-3xl px-6">
    <div class="max-w-md w-full glass p-12 rounded-[50px] text-center border-gold/20 shadow-[-20px_-20px_60px_rgba(255,255,255,0.01),20px_20px_60px_rgba(0,0,0,0.5)]">
      <div class="w-16 h-16 border border-gold/30 mx-auto mb-10 transform rotate-45 flex items-center justify-center bg-gold/5">
        <span class="text-gold font-bold -rotate-45 text-2xl">A</span>
      </div>
      
      <!-- Stage 1: Email -->
      <div id="auth-stage-email" class="space-y-8">
        <h2 class="lux-text text-xl gold-glow">Elite Authentication</h2>
        <p class="text-white/30 text-xs tracking-widest font-light">Enter your email to receive an exclusive access code.</p>
        <input type="email" id="auth-email" placeholder="email@luxury.com" class="w-full bg-white/5 border border-white/10 rounded-full px-8 py-5 text-center text-sm focus:outline-none focus:border-gold/50 transition-all font-light tracking-widest" />

      <!-- Stage 2: OTP -->
      <div id="auth-stage-otp" class="hidden space-y-8">

        <p class="text-white/30 text-xs tracking-widest font-light">A 6-digit code has been sent to your essence.</p>
        <div class="flex justify-center gap-3">
           <input type="text" id="auth-otp" maxlength="6" placeholder="000000" class="bg-transparent border-b-2 border-gold/20 text-4xl text-center w-48 focus:outline-none focus:border-gold transition-all tracking-[0.5em] font-thin" />
        </div>
        <button id="btn-verify-otp" class="btn-aura w-full text-[10px] py-5">Initialize Aura</button>
        <button onclick="localStorage.clear(); location.reload();" class="text-[9px] lux-text text-white/20 hover:text-gold block mx-auto underline mt-4">Reset Authentication</button>
      </div>
    </div>
  </template>

  <!-- Auth Portal (Landing) -->
  <div id="auth-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#020202] transition-all duration-1000">

    <div class="w-full max-w-md relative z-10 text-center">
      <div id="auth-stage-email" class="space-y-12">
        <div class="flex flex-col items-center gap-6">
           <div class="w-16 h-16 border border-gold/30 flex items-center justify-center transform rotate-45 bg-gold/5 mb-4">
             <span class="text-gold font-bold -rotate-45 text-3xl italic">A</span>
           </div>
           <h1 class="lux-text text-3xl gold-glow tracking-[0.3em]">AURA ELITE+</h1>
           <p class="text-white/20 lux-text text-[10px] tracking-[0.4em] uppercase">The Sovereign of Extraction</p>
        </div>
        <div class="space-y-4">
          <input type="email" id="auth-email" placeholder="ENTER YOUR LUXURY EMAIL" class="w-full bg-transparent border-b border-gold/20 py-4 text-center lux-text text-[10px] tracking-widest focus:outline-none focus:border-gold transition-colors text-white/80" />
          <button id="btn-send-otp" class="btn-aura w-full text-[10px] py-6">Request Access</button>
        </div>
      </div>
      <div id="auth-stage-otp" class="hidden space-y-12">
        <h2 class="lux-text text-xl gold-glow tracking-widest">Verify Estate</h2>
        <div class="flex justify-center gap-3">
           <input type="text" id="auth-otp" maxlength="6" placeholder="000000" class="bg-transparent border-b-2 border-gold/20 text-4xl text-center w-64 focus:outline-none focus:border-gold transition-all tracking-[0.5em] font-thin" />
        </div>
        <button id="btn-verify-otp" class="btn-aura w-full text-[10px] py-6">Authorize Studio</button>
        <button onclick="localStorage.clear(); location.reload();" class="text-[9px] lux-text text-white/20 hover:text-gold block mx-auto underline mt-4">Reset Credentials</button>
      </div>
    </div>
  </div>

  <!-- Software Blueprint (Locked) -->
  <template id="app-blueprint">
    <div id="app-container" class="opacity-0 transition-opacity duration-1000">
      <div id="cursor-ring" class="hidden md:block"></div>
    <div id="cursor-ring" class="hidden md:block"></div>
  
  <!-- Navigation -->
  <nav class="fixed right-10 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-6">
    <div class="nav-dot active" onclick="scrollTo('hero')"></div>
    <div class="nav-dot" onclick="scrollTo('features')"></div>
    <div class="nav-dot" onclick="scrollTo('studio')"></div>
  </nav>

  <!-- Header -->
  <header class="fixed top-0 left-0 w-full p-12 flex justify-between items-center z-40">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 border border-gold/30 flex items-center justify-center transform rotate-45 bg-gold/10">
        <span class="text-gold font-bold -rotate-45 text-xl">A</span>
      </div>
      <h1 class="lux-text text-2xl gold-glow text-white/90">Aura Elite+</h1>
    </div>
    <div class="status-indicator flex items-center gap-6">
       <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 bg-gold rounded-full animate-pulse"></span>
          <span class="lux-text text-[10px] text-gold/60">Quantum Edge v2.5</span>
       </div>
       <button id="btn-logout" class="lux-text text-[9px] text-white/40 hover:text-white transition-colors border border-white/10 px-4 py-1.5 rounded-full hover:border-gold/30">Sign Out</button>
    </div>
  </header>

  <!-- SECTION 1: HERO -->
  <section id="hero" class="text-center overflow-hidden">
    <div class="relative z-10 hero-reveal">
      <h2 class="text-[12px] lux-text text-gold mb-8 tracking-[0.6em]">The New Standard of Precision</h2>
      <h1 class="text-8xl md:text-[10rem] font-thin tracking-tighter mb-12 leading-none">
        Pure <span class="font-bold italic text-white/100 gold-glow">Obsidian</span>
      </h1>
      <p class="text-lg md:text-xl font-light text-white/30 tracking-[0.2em] max-w-3xl mx-auto mb-16 leading-relaxed">
        Beyond background removal. An architectural approach to digital extraction, refined with gold-standard AI.
      </p>
      <button onclick="scrollTo('studio')" class="btn-aura text-xs">Enter High-Res Studio</button>
    </div>
    
    <!-- Hero Decoration -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-20 pointer-events-none">
       <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle,rgba(255,215,0,0.05)_0%,transparent_70%)]"></div>
    </div>
  </section>

  <!-- SECTION 2: FEATURES -->
  <section id="features" class="bg-[#050505]">
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-16 w-full">
      
      <!-- Feature 1 -->
      <div class="feature-card shimmer reveal-on-scroll">
         <svg class="lux-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2v20M2 12h20M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10" stroke-linecap="round"/><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5Z" stroke-linejoin="round"/></svg>
         <h4 class="lux-text text-gold text-xs mb-4">Neural Architecture</h4>
         <h3 class="text-3xl font-light mb-6 tracking-tight">Quantum Extraction</h3>
         <p class="text-white/30 font-light leading-relaxed">Analyzes every individual pixel fragment to ensure hair and silk edges remain flawlessly preserved.</p>
      </div>

      <!-- Feature 2 -->
      <div class="feature-card shimmer reveal-on-scroll" style="transition-delay: 150ms">
         <svg class="lux-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2L2 7l10 5 10-5-10-5ZM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round"/></svg>
         <h4 class="lux-text text-gold text-xs mb-4">Manual Refinement</h4>
         <h3 class="text-3xl font-light mb-6 tracking-tight">Jewelry Brusher</h3>
         <p class="text-white/30 font-light leading-relaxed">The Magic Brush evolved. Surgical control over every transparency layer with metallic-glass smoothness.</p>
      </div>

      <!-- Feature 3 -->
      <div class="feature-card shimmer reveal-on-scroll" style="transition-delay: 300ms">
         <svg class="lux-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path d="M19 12a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/><path d="M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z" stroke-dasharray="2 2"/></svg>
         <h4 class="lux-text text-gold text-xs mb-4">Optic Fidelity</h4>

      </div>

    </div>
  </section>

  <!-- SECTION 3: STUDIO -->
  <section id="studio" class="p-0">
    
    <!-- Upload Portal -->
    <div id="upload-state" class="reveal-on-scroll">
       <div class="aura-port group" onclick="document.getElementById('file-input').click()">
          <div class="port-ring"></div>
          <div class="flex flex-col items-center gap-6 relative z-10">
             <div class="w-16 h-16 border border-gold/40 flex items-center justify-center transform rotate-45 group-hover:bg-gold/10 transition-all duration-700">

       </div>

    </div>

    <!-- Loading State -->
    <div id="loading-state" class="hidden flex flex-col items-center gap-12 py-32">
       <div class="aura-port active relative overflow-hidden">
          <div class="scan-line"></div>
          <p class="lux-text text-gold text-xs animate-pulse">Extracting Essence...</p>
       </div>
       <p class="text-white/20 lux-text text-[9px] uppercase tracking-[0.5em]">Neural Grid Active</p>
    </div>

    <!-- MAIN EDITOR -->
    <div id="editor-state" class="hidden w-full max-w-[1700px] px-12 py-12 h-[90vh] fade-in">
       <div class="grid grid-cols-1 lg:grid-cols-[1fr_400px] gap-12 h-full">
          
          <!-- Viewport -->
          <div class="flex flex-col gap-8">
             <div class="flex-1 glass-editor relative overflow-hidden group shadow-inner flex items-center justify-center" id="viewport">
                <div class="absolute inset-0 bg-[#050505] opacity-50 z-0"></div>
                <canvas id="main-canvas" class="relative z-10 cursor-crosshair shadow-2xl"></canvas>
                
                <!-- Tool Bar Modern -->
                <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-2 p-3 rounded-full bg-black/60 backdrop-blur-2xl border border-gold/20 shadow-2xl z-20">
                   <button id="tool-pan" title="Architectural Pan" class="tool-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="m15 15-3-3-3 3"/><path d="m15 9-3 3-3-3"/></svg></button>
                   <div class="w-px h-6 bg-white/10 mx-2"></div>
                   <button id="tool-erase" title="Surgical Eraser" class="tool-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l4.3 4.3c1 1 1 2.5 0 3.4L10.8 21z"/><path d="m22 21-5-5"/><path d="m11 11 5 5"/></svg></button>
                   <button id="tool-restore" title="Golden Restore" class="tool-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></button>
                   <div class="w-px h-6 bg-white/10 mx-2"></div>
                   <div class="flex items-center gap-1 px-4">
                      <button id="btn-zoom-out" class="opacity-30 hover:opacity-100 transition-opacity">－</button>
                      <span id="zoom-text" class="lux-text text-[9px] w-12 text-center text-gold">100%</span>
                      <button id="btn-zoom-in" class="opacity-30 hover:opacity-100 transition-opacity">＋</button>
                   </div>
                </div>
             </div>

             <div class="flex items-center justify-between px-4">
                <button onclick="location.reload()" class="lux-text text-[9px] opacity-20 hover:opacity-100 transition-opacity border-b border-transparent hover:border-white/20 pb-1">Reset Session</button>
                <div class="flex gap-6">
                   <button id="btn-download-png" class="lux-text text-[10px] text-gold border border-gold/30 px-10 py-4 rounded-full hover:bg-gold/10 transition-all">Export PNG</button>
                   <button id="btn-download-jpg" class="btn-aura px-12 py-4 text-[10px]">Save JPG</button>
                </div>
             </div>
          </div>

          <!-- Controls Side Modern -->
          <aside class="glass-editor p-12 flex flex-col gap-12 overflow-y-auto">
             
             <!-- Control Group -->

                <div class="flex items-center justify-between">

                   <span class="w-8 h-px bg-gold/20"></span>
                </div>
                <div class="grid grid-cols-5 gap-4">
                   <div class="aspect-square rounded-full border border-gold/10 cursor-pointer hover:border-gold transition-all" style="background: transparent" onclick="app.setBg('transparent')"></div>
                   <div class="aspect-square rounded-full bg-white cursor-pointer" onclick="app.setBg('#ffffff')"></div>

                   <div class="aspect-square rounded-full bg-gradient-to-br from-gold to-gold-dark cursor-pointer" onclick="app.setBg('gradient')"></div>
                </div>
             </div>

             <div class="space-y-8">
                <h4 class="lux-text text-[10px] text-gold/40">Optics</h4>
                <div class="space-y-6">
                   <div>
                      <div class="flex justify-between lux-text text-[9px] text-white/40 mb-4"><label>Bokeh Intensity</label><span id="blur-val">0%</span></div>
                      <input type="range" id="input-blur" class="w-full" min="0" max="40" value="0" />
                   </div>
                   <div>
                      <div class="flex justify-between lux-text text-[9px] text-white/40 mb-4"><label>Jewelry Brush Size</label><span id="brush-size-val">30px</span></div>
                      <input type="range" id="input-brush-size" class="w-full" min="5" max="150" value="30" />
                   </div>

                      <input type="range" id="input-brush-hard" class="w-full" min="0" max="1" step="0.1" value="0.5" />
                   </div>
                </div>
             </div>

             <div class="space-y-8">
                <h4 class="lux-text text-[10px] text-gold/40">Vision Tuning</h4>
                <div class="space-y-6">
                   <div>
                      <div class="flex justify-between lux-text text-[9px] text-white/40 mb-4"><label>Exposure</label><span id="bright-val">100%</span></div>
                      <input type="range" id="input-bright" class="w-full" min="0" max="200" value="100" />
                   </div>
                   <div>
                      <div class="flex justify-between lux-text text-[9px] text-white/40 mb-4"><label>Dynamic Contrast</label><span id="contrast-val">100%</span></div>
                      <input type="range" id="input-contrast" class="w-full" min="0" max="200" value="100" />
                   </div>
                </div>
             </div>

          </aside>
      </div>
    </div> <!-- End app-container -->
  </section>

  <style>
    .tool-btn { padding: 0.75rem; border-radius: 50%; color: rgba(255,255,255,0.4); transition: all 0.3s; }
    .tool-btn:hover { background: rgba(255,215,0,0.1); color: var(--gold); }
    .tool-btn.active { background: var(--gold); color: #000; }
    
    .fade-in { animation: fadeIn 1s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    input[type=range]::-webkit-slider-runnable-track { height: 1px; background: rgba(255,215,0,0.1); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--gold); margin-top: -6px; box-shadow: 0 0 10px rgba(255,215,0,0.5); cursor: pointer; transition: transform 0.3s; }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }
  </style>

  <script>
    // --- 0. AUTH ENGINE ---
    class AuraAuth {
      constructor() {
        this.overlay = document.getElementById('auth-overlay');
        this.emailInput = document.getElementById('auth-email');
        this.otpInput = document.getElementById('auth-otp');
        this.token = localStorage.getItem('aura_token');
        this.email = localStorage.getItem('aura_email') || localStorage.getItem('aura_email_pending') || '';
        
        if (this.token) {
          this.checkToken();
        } else {
          this.showOverlay();
        }
        this.init();
      }

      showOverlay() {
        this.overlay.classList.remove('hidden');
        document.body.classList.add('no-scroll-auth');
        document.getElementById('app-container').classList.add('hidden');
        
        // If we have a pending email, skip to OTP stage
        if (localStorage.getItem('aura_email_pending')) {
           document.getElementById('auth-stage-email').classList.add('hidden');
           document.getElementById('auth-stage-otp').classList.remove('hidden');
        }
      }

      async checkToken() {
        try {
          const res = await fetch('/api/auth/check', {
            headers: { 'Authorization': `Bearer ${this.token}` }
          });
          if (res.ok) {
            this.unlock();
          } else {
            console.warn('[AUTH] Token invalid or expired');
            localStorage.removeItem('aura_token');
            this.showOverlay();
          }
        } catch (e) { console.error('Auth Check Failed'); }
      }

      unlock() {
        console.log('[AUTH] Access Granted. Building Studio...');
        
        // 1. Physically build the app from the blueprint
        const blueprint = document.getElementById('app-blueprint');
        const clone = blueprint.content.cloneNode(true);
        document.body.appendChild(clone);

        // 2. Clear Auth Overlay
        gsap.to(this.overlay, { 
          opacity: 0, 
          scale: 1.1, 
          duration: 1.5, 
          ease: 'power4.inOut', 
          onComplete: () => {
            this.overlay.remove();
            document.body.classList.remove('no-scroll-auth');
            
            // 3. Setup interaction & editor
            const container = document.getElementById('app-container');
            container.classList.remove('opacity-0');
            container.classList.add('opacity-100');
            
            // Initialize the rest of the application
            initFullApp();
            gsap.from(".hero-reveal > *", { opacity: 0, y: 30, stagger: 0.2, duration: 1.5, ease: "power4.out" });
          } 
        });
      }

      init() {
        document.getElementById('btn-send-otp').onclick = () => this.sendOTP();
        document.getElementById('btn-verify-otp').onclick = () => this.verifyOTP();
        const logoutBtn = document.getElementById('btn-logout');
        if (logoutBtn) logoutBtn.onclick = () => this.logout();
      }

      logout() {
        localStorage.removeItem('aura_token');
        localStorage.removeItem('aura_email');
        localStorage.removeItem('aura_email_pending');
        location.reload();
      }

      async sendOTP() {
        this.email = this.emailInput.value;
        if (!this.email) return alert('Email required');
        
        try {
          const res = await fetch('/api/auth/send-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: this.email })
          });
          const data = await res.json();
          if (data.success) {
            localStorage.setItem('aura_email_pending', this.email);
            document.getElementById('auth-stage-email').classList.add('hidden');
            document.getElementById('auth-stage-otp').classList.remove('hidden');
          } else throw new Error(data.error);
        } catch (e) { alert(e.message); }
      }

      async verifyOTP() {
        const otp = this.otpInput.value.trim();
        if (!otp || otp.length < 6) return alert('Enter full 6-digit code');
        const email = this.email || localStorage.getItem('aura_email_pending');
        
        try {
          const res = await fetch('/api/auth/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
          });
          const data = await res.json();
          if (data.success) {
             localStorage.setItem('aura_token', data.token);
             localStorage.setItem('aura_email', email);
             localStorage.removeItem('aura_email_pending');
             this.unlock();
             gsap.to(this.overlay, { opacity: 0, scale: 1.1, duration: 1, ease: 'power4.in', onComplete: () => this.overlay.remove() });
          } else {
             alert(`Invalid: ${data.error}`);
          }
        } catch (e) { alert('Verification Error. Try again.'); }
      }
    }
    new AuraAuth();
    function initFullApp() {
      console.log('Building interactive layer...');
      gsap.registerPlugin(ScrollTrigger);

      // Floating Cursor Ring
      const cursor = document.getElementById('cursor-ring');
      document.addEventListener('mousemove', (e) => {
         gsap.to(cursor, { x: e.clientX - 25, y: e.clientY - 25, duration: 0.1 });
      });

      // Reveal Animations on newly generated DOM
      document.querySelectorAll(".reveal-on-scroll").forEach(el => {
          gsap.from(el, {
             scrollTrigger: { trigger: el, start: "top 90%" },
             opacity: 0, y: 50, duration: 2, ease: "expo.out"
          });
      });

      // 3D Tilt for Feature Cards
      document.querySelectorAll('.feature-card').forEach(card => {
          card.addEventListener('mousemove', (e) => {
             const rect = card.getBoundingClientRect();
             const x = (e.clientX - rect.left) / rect.width;
             const y = (e.clientY - rect.top) / rect.height;
             const rotateY = (x - 0.5) * 20;
             const rotateX = (y - 0.5) * -20;
             gsap.to(card, { rotateY, rotateX, duration: 0.5, ease: "power2.out" });
          });
          card.addEventListener('mouseleave', () => {
             gsap.to(card, { rotateY: 0, rotateX: 0, duration: 0.5 });
          });
      });

      // Nav Dot Sync
      window.addEventListener('scroll', () => {
         const sections = ['hero', 'features', 'studio'];
         const dots = document.querySelectorAll('.nav-dot');
         if (!dots.length) return;
         sections.forEach((id, i) => {
            const el = document.getElementById(id);
            if (!el) return;
            const rect = el.getBoundingClientRect();
            if (rect.top <= window.innerHeight/2 && rect.bottom >= window.innerHeight/2) {
               dots.forEach(d => d.classList.remove('active'));
               dots[i].classList.add('active');
            }
         });
      });

      // Fire up the Editor
      window.app = new AuraEditor();
    }

    function scrollTo(id) { 
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth' }); 
      else console.warn('Studio not built yet. Authenticate first.');
    }

    // Nav Dot Sync
    window.addEventListener('scroll', () => {
       const sections = ['hero', 'features', 'studio'];
       const dots = document.querySelectorAll('.nav-dot');
       sections.forEach((id, i) => {
          const el = document.getElementById(id);
          const rect = el.getBoundingClientRect();
          if (rect.top <= window.innerHeight/2 && rect.bottom >= window.innerHeight/2) {
             dots.forEach(d => d.classList.remove('active'));
             dots[i].classList.add('active');
          }
       });
    });

    // --- 2. EDITOR ENGINE ---
    class AuraEditor {
      constructor() {
        this.canvas = document.getElementById('main-canvas');
        this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
        this.originalImg = new Image();
        this.maskBuffer = document.createElement('canvas');
        this.maskCtx = this.maskBuffer.getContext('2d', { willReadFrequently: true });
        
        this.state = {
          zoom: 1, pan: { x: 0, y: 0 },
          tool: 'erase', 
          brushSize: 30, brushHardness: 0.5,
          bgColor: 'transparent', bgBlur: 0,
          brightness: 100, contrast: 100,
          isDragging: false, lastPoint: null
        };
        this.init();
      }

      init() {
        document.getElementById('file-input').onchange = (e) => this.handleUpload(e.target.files[0]);
        document.getElementById('tool-pan').onclick = () => this.setTool('pan');
        document.getElementById('tool-erase').onclick = () => this.setTool('erase');
        document.getElementById('tool-restore').onclick = () => this.setTool('restore');
        
        document.getElementById('btn-zoom-in').onclick = () => this.setZoom(this.state.zoom * 1.4);
        document.getElementById('btn-zoom-out').onclick = () => this.setZoom(this.state.zoom / 1.4);

        const bind = (id, key, disp, suf='') => {
           const el = document.getElementById(id);
           el.oninput = (e) => {
              this.state[key] = parseFloat(e.target.value);
              document.getElementById(disp).innerText = this.state[key] + suf;
              this.render();
           };
        };
        bind('input-blur', 'bgBlur', 'blur-val', '%');
        bind('input-brush-size', 'brushSize', 'brush-size-val', 'px');
        bind('input-brush-hard', 'brushHardness', 'brush-hard-val');
        bind('input-bright', 'brightness', 'bright-val', '%');
        bind('input-contrast', 'contrast', 'contrast-val', '%');

        this.canvas.onmousedown = (e) => this.onStart(e);
        window.onmousemove = (e) => this.onMove(e);
        window.onmouseup = () => this.onEnd();
        
        document.getElementById('btn-download-png').onclick = () => this.export('png');
        document.getElementById('btn-download-jpg').onclick = () => this.export('jpg');
      }

      async handleUpload(file) {
        if(!file) return;
        
        // Vercel / Serverless Payload Limit (4.5MB)
        if (file.size > 4 * 1024 * 1024) {
           alert('Aura Elite+ requires precision. Please upload an image under 4MB for high-res extraction.');
           return;
        }

        if(!localStorage.getItem('aura_token')) {
           alert('Access Denied: Please authenticate through the Elite portal first.');
           location.reload();
           return;
        }
        document.getElementById('upload-state').classList.add('hidden');
        document.getElementById('loading-state').classList.remove('hidden');
        document.getElementById('loading-state').classList.add('active');

        const fd = new FormData();
        fd.append('image', file);

        try {
          const res = await fetch('/remove-bg', { 
            method: 'POST', 
            body: fd,
            headers: { 'Authorization': `Bearer ${localStorage.getItem('aura_token')}` }
          });
          if (!res.ok) {
             const text = await res.text();
             throw new Error(text || `Server Error (${res.status})`);
          }
          const data = await res.json();
          if(!data.success) throw new Error(data.error);
          await this.initEditor(file, data.image);
        } catch(err) {
          alert('Extraction Failed: ' + err.message);
          location.reload();
        }
      }

      async initEditor(file, transparent) {
        console.log('Initializing Elite Studio...');
        const url = URL.createObjectURL(file);
        await new Promise(r => { this.originalImg.onload = r; this.originalImg.src = url; });
        console.log('Original Image Loaded:', this.originalImg.width, 'x', this.originalImg.height);
        
        const resImg = new Image();
        resImg.crossOrigin = "anonymous";
        await new Promise((r, rej) => { 
          resImg.onload = r; 
          resImg.onerror = (e) => { console.error('Transparent Image Load Failed'); rej(e); };
          resImg.src = transparent; 
        });
        console.log('Transparent Image Loaded:', resImg.width, 'x', resImg.height);

        this.canvas.width = this.maskBuffer.width = this.originalImg.width;
        this.canvas.height = this.maskBuffer.height = this.originalImg.height;
        this.maskCtx.clearRect(0,0,this.canvas.width, this.canvas.height);
        
        if (resImg.width > 0) {
           this.maskCtx.drawImage(resImg, 0, 0, this.canvas.width, this.canvas.height);
        } else {
           console.error('Extraction Result Empty - Fallback to Masking');
        }
        
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('editor-state').classList.remove('hidden');
        this.setZoom('fit');
        this.setTool('erase');
        this.render();
        console.log('Extraction Render Complete');
      }

      setTool(t) {
        this.state.tool = t;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tool-'+t).classList.add('active');
      }

      setZoom(v) {
        if(v==='fit') {
           const vp = document.getElementById('viewport');
           this.state.zoom = Math.min((vp.clientWidth - 100)/this.canvas.width, (vp.clientHeight - 100)/this.canvas.height, 1);
        } else {
           this.state.zoom = Math.max(0.01, Math.min(20, v));
        }
        document.getElementById('zoom-text').innerText = Math.round(this.state.zoom*100)+'%';
        this.render();
      }

      setBg(val) { this.state.bgColor = val; this.render(); }

      onStart(e) {
        this.state.isDragging = true;
        const pos = this.getCanvasPos(e);
        if(this.state.tool!=='pan') this.drawBrush(pos);
        this.state.lastPoint = pos;
      }

      onMove(e) {
        if(!this.state.isDragging) return;
        const rect = this.canvas.getBoundingClientRect();
        const pos = this.getCanvasPos(e);
        if(this.state.tool==='pan') {
           this.state.pan.x += (e.clientX - rect.left - (this.state.lastPoint.rawX - rect.left));
           this.state.pan.y += (e.clientY - rect.top - (this.state.lastPoint.rawY - rect.top));
        } else {
           this.drawBrush(pos);
        }
        this.state.lastPoint = { ...pos, rawX: e.clientX, rawY: e.clientY };
        this.render();
      }

      onEnd() { this.state.isDragging = false; }

      getCanvasPos(e) {
        const rect = this.canvas.getBoundingClientRect();
        return {
          x: (e.clientX - rect.left) / this.state.zoom,
          y: (e.clientY - rect.top) / this.state.zoom,
          rawX: e.clientX, rawY: e.clientY
        };
      }

      drawBrush(pos) {
        const ctx = this.maskCtx;
        ctx.save();
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, this.state.brushSize / (2 * this.state.zoom), 0, Math.PI * 2);
        if(this.state.tool==='erase') {
           ctx.globalCompositeOperation = 'destination-out';
           ctx.fill();
        } else {
           ctx.globalCompositeOperation = 'source-over';
           ctx.clip();
           ctx.drawImage(this.originalImg, 0, 0);
        }
        ctx.restore();
      }

      render() {
        this.ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
        if(this.state.bgColor!=='transparent') {
           this.ctx.save();
           if(this.state.bgColor==='gradient') {
              const g = this.ctx.createLinearGradient(0,0,this.canvas.width, this.canvas.height);
              g.addColorStop(0, '#FFD700'); g.addColorStop(1, '#8B4513');
              this.ctx.fillStyle = g;
           } else { this.ctx.fillStyle = this.state.bgColor; }
           this.ctx.fillRect(0,0,this.canvas.width, this.canvas.height);
           this.ctx.restore();
        }
        this.ctx.save();
        this.ctx.filter = `brightness(${this.state.brightness}%) contrast(${this.state.contrast}%)`;
        this.ctx.drawImage(this.maskBuffer, 0, 0);
        this.ctx.restore();
        this.canvas.style.transform = `translate(calc(-50% + ${this.state.pan.x}px), calc(-50% + ${this.state.pan.y}px)) scale(${this.state.zoom})`;
      }

      export(fmt) {
        const exp = document.createElement('canvas');
        exp.width = this.canvas.width; exp.height = this.canvas.height;
        const eCtx = exp.getContext('2d');
        if(this.state.bgColor!=='transparent') {
           if(this.state.bgColor==='gradient') {
              const g = eCtx.createLinearGradient(0,0,exp.width, exp.height);
              g.addColorStop(0, '#FFD700'); g.addColorStop(1, '#8B4513');
              eCtx.fillStyle = g;
           } else { eCtx.fillStyle = this.state.bgColor; }
           eCtx.fillRect(0,0,exp.width, exp.height);
        }
        eCtx.filter = `brightness(${this.state.brightness}%) contrast(${this.state.contrast}%)`;
        eCtx.drawImage(this.maskBuffer, 0, 0);
        const l = document.createElement('a');
        l.download = `aura-elite-${Date.now()}.${fmt}`;
        l.href = exp.toDataURL(`image/${fmt==='png'?'png':'jpeg'}`, 1.0);
        l.click();
      }
    }
    // Global Reference
    window.app = null;
  </script>
